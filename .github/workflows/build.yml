name: Build

on:
  push:
    branches: [ "master", "main", "enterprise" ]
  pull_request:
    branches: [ "master", "main", "enterprise" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: |
        dotnet restore DesktopCommandCenter.slnx
        dotnet restore src\DesktopCommandCenter.UI\DesktopCommandCenter.UI.csproj -r win-x64

    - name: Build
      run: dotnet build DesktopCommandCenter.slnx --configuration Release -p:PublishReadyToRun=false
