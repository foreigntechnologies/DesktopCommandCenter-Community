name: Build

on:
  push:
    branches: [ "master", "main", "enterprise" ]
  pull_request:
    branches: [ "master", "main", "enterprise" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      # O csproj define RuntimeIdentifier=win-x64, então o restore da solution
      # já baixa os runtime packs corretos automaticamente.
      run: dotnet restore DesktopCommandCenter.slnx

    - name: Build
      # NETSDK1134: não é possível passar -r em solution (.slnx); o RID vem do csproj.
      run: dotnet build DesktopCommandCenter.slnx --no-restore --configuration Release
